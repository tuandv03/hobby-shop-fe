<div class="app-shell">
  <header class="app-header">
    <nav class="navbar navbar-expand-lg">
      <div class="container-xxl">
        <a routerLink="/" class="navbar-brand">
          <span class="brand-mark">★</span>
          <span>YGO Card Shop</span>
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavigation"
          aria-controls="mainNavigation"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div id="mainNavigation" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
            <li class="nav-item">
              <a routerLink="/" routerLinkActive="active" class="nav-link">
                Trang chủ
              </a>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Cards
              </a>
              <ul class="dropdown-menu">
                <li><a routerLink="/cards" class="dropdown-item">All Cards</a></li>
                <li>
                  <a routerLink="/cards/staples" class="dropdown-item">Staples Cards</a>
                </li>
                <li><a routerLink="/cards/hot" class="dropdown-item">Hot Cards</a></li>
                <li>
                  <a routerLink="/cards/archetypes" class="dropdown-item">Archetypes</a>
                </li>
              </ul>
            </li>

            <li class="nav-item">
              <a routerLink="/sets" routerLinkActive="active" class="nav-link">
                Sets
              </a>
            </li>

            <li class="nav-item">
              <a routerLink="/cart" routerLinkActive="active" class="nav-link">
                Giỏ hàng
              </a>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Admin
              </a>
              <ul class="dropdown-menu">
                <li>
                  <a routerLink="/admin/inventory" class="dropdown-item">Kho hàng</a>
                </li>
                <li>
                  <a routerLink="/admin/orders" class="dropdown-item">
                    Quản lý đơn hàng
                  </a>
                </li>
              </ul>
            </li>
          </ul>

          <div class="header-actions">
            <button
              pButton
              type="button"
              [icon]="dark() ? 'pi pi-sun' : 'pi pi-moon'"
              severity="secondary"
              [text]="true"
              (click)="toggleTheme()"
              [attr.aria-label]="dark() ? 'Light mode' : 'Dark mode'"
            ></button>

            <a routerLink="/cart" class="cart-button">
              <i class="pi pi-shopping-cart" aria-hidden="true"></i>
              <span *ngIf="cartCount() as c">{{ c }}</span>
            </a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <div class="container-xxl">
      <span>© {{ year }} YGO Card Shop</span>
      <span>Yu-Gi-Oh! theme inspired UI</span>
    </div>
  </footer>
</div>
